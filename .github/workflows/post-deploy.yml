name: Post-deploy production smoke

# Runs immediately after Vercel reports a successful deployment to the
# Production environment. Hits the LIVE site (https://objectlesson.la) with
# a short read-only Playwright suite. If anything fails, opens a GitHub
# issue automatically.
#
# This is the safety net for "shipped broken to prod." It does not roll
# back automatically (rolling back via API requires Vercel-side config we
# don't have yet) — but it makes failures impossible to ignore.

on:
  deployment_status:

jobs:
  smoke:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run production smoke
        env:
          PLAYWRIGHT_BASE_URL: https://objectlesson.la
        run: npx playwright test tests/production-smoke.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: playwright-report/
          retention-days: 14

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const url = context.payload.deployment_status.target_url || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production smoke FAILED — deploy ${sha.substring(0, 7)}`,
              body: [
                'Production smoke tests failed after a successful Vercel deploy.',
                '',
                `**Commit:** ${sha}`,
                `**Deploy URL:** ${url}`,
                `**CI run:** ${runUrl}`,
                '',
                'Fix forward immediately or roll back via Vercel dashboard.',
                'Download the Playwright report from the run artifacts.',
              ].join('\n'),
              labels: ['production-issue', 'smoke-test'],
            });
