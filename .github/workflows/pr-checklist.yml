name: PR checklist enforcer

# Three checks, all blocking, all run on every PR event:
#
#   1. PR template was used and every checkbox is ticked
#      (anti-pattern: opening a PR without the template, or with unchecked boxes).
#
#   2. PR body contains real evidence — a screenshot, a screen recording,
#      or a hosted video link. "It compiles / tests pass" is NOT evidence.
#
#   3. AUDIT row sync — if the PR title or body references an audit row ID
#      (e.g. "P0-2"), the diff in this PR MUST flip that row from `- [ ]`
#      to `- [x]` in AUDIT.md. No silent claims of completion.
#
# Together these prevent the "shipped without exercising it / declared done
# without proof" failure mode that produced this audit list in the first place.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const all = body.match(/^- \[[ xX]\] /gm) || [];
            const unchecked = body.match(/^- \[ \] /gm) || [];

            if (all.length === 0) {
              core.setFailed(
                'PR description must use the template (.github/pull_request_template.md). ' +
                'No checklist items were found.'
              );
              return;
            }

            if (unchecked.length > 0) {
              core.setFailed(
                `${unchecked.length} required checkbox(es) still unchecked in the PR description. ` +
                'Either check them (with evidence) or remove the item if it does not apply.'
              );
              return;
            }

            core.info(`All ${all.length} checklist items checked.`);

  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Real evidence patterns. Each one is tightened to reject the
            // common ways someone can fake "I attached something."
            //
            //   - Markdown image must have an http(s) URL with a file
            //     extension (png/jpg/jpeg/gif/webp/svg/mp4/mov/webm). A
            //     plain string in the parens (e.g. "placeholder") fails.
            //   - <img> must have an http(s) src.
            //   - GitHub user-attachment URLs only count if they have the
            //     `/assets/{hash}` path. Real drag-and-drop uploads always
            //     do; hand-rolled placeholders typically don't.
            //   - Loom / YouTube URLs must include a watch ID, not just
            //     the bare domain.
            const patterns = [
              /!\[[^\]]*\]\(https?:\/\/[^)\s]+\.(?:png|jpe?g|gif|webp|svg|mp4|mov|webm)(?:\?[^)\s]*)?\)/i,
              /<img\s[^>]*src=["']https?:\/\//i,
              /https?:\/\/github\.com\/user-attachments\/assets\/[A-Za-z0-9][A-Za-z0-9-]{6,}/i,
              /https?:\/\/(?:www\.)?loom\.com\/share\/[A-Za-z0-9]{8,}/i,
              /https?:\/\/(?:www\.)?youtube\.com\/watch\?v=[A-Za-z0-9_-]{6,}/i,
              /https?:\/\/(?:www\.)?youtu\.be\/[A-Za-z0-9_-]{6,}/i,
            ];

            const matched = patterns.some((rx) => rx.test(body));

            if (!matched) {
              core.setFailed(
                'PR body has no embedded evidence. Required: a screenshot ' +
                '(drag-and-drop into the PR body), a Loom/YouTube link, or ' +
                'a markdown image. A bare Vercel preview URL is not evidence — ' +
                'you must show the change working.'
              );
              return;
            }

            core.info('Evidence found in PR body.');

  audit-row-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            const title = context.payload.pull_request.title || '';
            const body = context.payload.pull_request.body || '';
            const baseSha = context.payload.pull_request.base.sha;
            const headSha = context.payload.pull_request.head.sha;

            // Find audit row IDs referenced in the title or body: P0-1, P1-13, P2-39, etc.
            const idRe = /\bP[012]-\d+\b/g;
            const titleIds = title.match(idRe) || [];
            const bodyIds = body.match(idRe) || [];
            const referenced = [...new Set([...titleIds, ...bodyIds])];

            if (referenced.length === 0) {
              core.info('No audit row IDs referenced — skipping sync check.');
              return;
            }

            try {
              execSync(`git fetch origin ${baseSha} --depth=1`, { stdio: 'pipe' });
            } catch {}
            let diff = '';
            try {
              diff = execSync(
                `git diff ${baseSha}..${headSha} -- AUDIT.md`,
                { encoding: 'utf8' }
              );
            } catch (e) {
              core.setFailed(`Could not diff AUDIT.md: ${e.message}`);
              return;
            }

            // For each referenced ID, the diff must contain a line that flips
            //   - [ ] **P0-2 ...   →   - [x] **P0-2 ...
            // Look for both sides of the hunk:
            //   +- [x] **P0-2        (added)
            //   -- [ ] **P0-2        (removed)
            const missing = [];
            for (const id of referenced) {
              const addedRe = new RegExp(`^\\+- \\[[xX]\\] \\*\\*${id}\\b`, 'm');
              const removedRe = new RegExp(`^-- \\[ \\] \\*\\*${id}\\b`, 'm');
              if (!addedRe.test(diff) || !removedRe.test(diff)) {
                missing.push(id);
              }
            }

            if (missing.length > 0) {
              core.setFailed(
                `PR references audit row(s) ${missing.join(', ')} but the AUDIT.md ` +
                `diff does not flip them from "- [ ]" to "- [x]". Either flip the ` +
                `box in this PR, or remove the audit ID from the title/body if this ` +
                `PR doesn't actually close it.`
              );
              return;
            }

            core.info(
              `AUDIT.md correctly flips ${referenced.join(', ')} from "[ ]" to "[x]".`
            );
